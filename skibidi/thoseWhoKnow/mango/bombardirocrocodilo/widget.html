<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Anime Widget</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1c1c1e;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
        }

        .card {
            max-width: 95vw;
            aspect-ratio: 360 / 169;
            margin: 2vh auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            padding: 5%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .title {
            font-size: 1.4em;
            font-weight: 600;
            color: #ffcc00;
            margin-bottom: 0.8em;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 0.5em;
            margin-bottom: 0.4em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dot {
            width: 0.6em;
            height: 0.6em;
            background-color: #ffcc00;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .placeholder {
            font-style: italic;
            opacity: 0.6;
        }

        .button-container {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            /* spacing between buttons */
        }

        .nav-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #444;
            color: #ffcc00;
            padding: 0.4em 0.8em;
            font-size: 0.9em;
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            /* changed from inline-block */
            align-items: center;
            /* vertical center */
            justify-content: center;
            /* horizontal center */
            height: 2em;
            /* optional: match height to .reset-button */
        }

        .reset-button svg {
            width: 1.2em;
            height: 1.2em;
            fill: #ffcc00;
        }

        .reset-button {
            width: 2em;
            height: 2em;
            padding: 0.3em;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="title" id="dayLabel">Anime for ...</div>
        <ul id="animeList"></ul>
        <div class="button-container" id="buttons">
            <!-- Navigation buttons will be injected here -->
        </div>
    </div>

    <script>
        const animes = [
            ['Intro to Mineralogy'],										/*Sunday*/
            ['Sakamoto Days'],											/*Monday*/
            ['None'],		 										/*Tuesday*/
            ['Shield Hero S4', 'Vending Machine S2', '7th Prince', 'P&S Reboot'],				/*Wednesday*/
            ['Dr. Stone', 'Dan Da Dan S2', 'Mikadono Sisters'], 						/*Thursday*/
            ['None'], 												/*Friday*/
            ['Dress-up Darling', 'Fragrant Flower'] 								/*Saturday*/
        ];

        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        const params = new URLSearchParams(location.search);
        const todayIndex = new Date().getDay();
        let dayIndex = parseInt(params.get('day'));

        if (isNaN(dayIndex) || dayIndex < 0 || dayIndex > 6) {
            dayIndex = todayIndex;
        }

        const dayLabel = document.getElementById('dayLabel');
        const animeList = document.getElementById('animeList');

        dayLabel.textContent = `Anime for ${days[dayIndex]}`;

        const list = animes[dayIndex];
        if (list.length === 1 && list[0] === 'None') {
            const li = document.createElement('li');
            li.textContent = 'No new episodes today.';
            li.classList.add('placeholder');
            animeList.appendChild(li);
        } else {
            list.forEach(title => {
                const li = document.createElement('li');
                const dot = document.createElement('div');
                dot.classList.add('dot');
                li.appendChild(dot);
                li.appendChild(document.createTextNode(title));
                animeList.appendChild(li);
            });
        }

        // Build button links
        const prevDay = (dayIndex + 6) % 7;
        const nextDay = (dayIndex + 1) % 7;
        const buttons = document.getElementById('buttons');

        const prev = document.createElement('a');
        prev.className = 'nav-button';
        prev.href = `widget.php?day=${prevDay}`;
        prev.textContent = 'Prev';


        const reset = document.createElement('a');
        reset.className = 'reset-button';
        reset.href = 'widget.php';
        reset.innerHTML = `
      <svg viewBox="0 0 24 24">
        <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6a6 6 0 01-6 6 6 6 0 01-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
      </svg>`;

        const next = document.createElement('a');
        next.className = 'nav-button';
        next.href = `widget.php?day=${nextDay}`;
        next.textContent = 'Next';

        buttons.appendChild(prev);
        buttons.appendChild(reset);
        buttons.appendChild(next);
    </script>
</body>

</html>
